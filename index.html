<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>山向奇门深层起局排盘系统 - 黑金版</title>
  
  <!-- 引入 Tailwind CSS 用于样式渲染 -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 引入 React 核心库 -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 引入 Babel 用于在浏览器中直接编译 JSX 代码 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- 引入导出 PDF 所需的依赖库 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-950 min-h-screen">
  <!-- React 应用挂载点 -->
  <div id="root"></div>

  <!-- React 业务逻辑代码 -->
  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // --- 基础数据配置 ---
    const STEMS = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
    const BRANCHES = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
    const MOUNTAINS = ['壬', '子', '癸', '丑', '艮', '寅', '甲', '卯', '乙', '辰', '巽', '巳', '丙', '午', '丁', '未', '坤', '申', '庚', '酉', '辛', '戌', '乾', '亥'];
    const OUTER_RING = [1, 8, 3, 4, 9, 2, 7, 6]; 
    const RING_INDEX = { 1: 0, 8: 1, 3: 2, 4: 3, 9: 4, 2: 5, 7: 6, 6: 7 };
    const DOORS = ['休', '生', '伤', '杜', '景', '死', '惊', '开'];
    const STARS = ['蓬', '任', '冲', '辅', '英', '芮', '柱', '心'];
    const DEITIES = ['符', '蛇', '阴', '六', '白', '玄', '地', '天'];
    const BASE_STEMS = ['戊', '己', '庚', '辛', '壬', '癸', '丁', '丙', '乙'];
    const YUAN_JU = {  
      '壬': [1, 1, 7, 4], '子': [1, 2, 8, 5], '癸': [1, 3, 9, 6],  
      '丑': [1, 8, 5, 2], '艮': [1, 9, 6, 3], '寅': [1, 1, 7, 4],  
      '甲': [1, 3, 9, 6], '卯': [1, 4, 1, 7], '乙': [1, 5, 2, 8],  
      '辰': [1, 4, 1, 7], '巽': [1, 5, 2, 8], '巳': [0, 6, 9, 3],  
      '丙': [0, 9, 3, 6], '午': [0, 8, 2, 5], '丁': [0, 7, 1, 4],  
      '未': [0, 2, 5, 8], '坤': [0, 1, 4, 7], '申': [0, 9, 3, 6],  
      '庚': [0, 7, 1, 4], '酉': [0, 6, 9, 3], '辛': [0, 5, 8, 2],  
      '戌': [0, 6, 9, 3], '乾': [0, 5, 8, 2], '亥': [1, 4, 1, 7]
    };

    // --- 深化神煞配置 ---
    const NA_JIA_BAGUA = {  
      '乾':'乾', '甲':'乾',  
      '亥':'震', '卯':'震', '未':'震', '庚':'震',  
      '艮':'艮', '丙':'艮',  
      '巽':'巽', '辛':'巽',  
      '巳':'兑', '酉':'兑', '丑':'兑', '丁':'兑',  
      '寅':'离', '午':'离', '戌':'离', '壬':'离',  
      '申':'坎', '子':'坎', '辰':'坎', '癸':'坎',  
      '坤':'坤', '乙':'坤'
    };
    const BAGUA_BITS = { '乾':7, '兑':3, '离':5, '震':1, '巽':6, '坎':2, '艮':4, '坤':0 };
    const PALACE_TO_BAGUA = { 1:'坎', 8:'艮', 3:'震', 4:'巽', 9:'离', 2:'坤', 7:'兑', 6:'乾' };
    const XIAO_SHEN_SHA = { 4: '生气', 3: '延年', 7: '祸害', 2: '绝命', 1: '五鬼', 5: '六煞', 6: '天医', 0: '伏位' };
    const DA_SHEN_SHA   = { 4: '生气', 3: '天医', 7: '延年', 2: '绝命', 1: '祸害', 5: '六煞', 6: '五鬼', 0: '伏位' };
    const OUTER_LAYOUT = {  
      4: { top: ['巽', '巳'], left: ['辰'] },  
      9: { top: ['丙', '午', '丁'] },  
      2: { top: ['未', '坤'], right: ['申'] },  
      3: { left: ['乙', '卯', '甲'] },  
      7: { right: ['庚', '酉', '辛'] },  
      8: { bottom: ['艮', '丑'], left: ['寅'] },  
      1: { bottom: ['癸', '子', '壬'] },  
      6: { bottom: ['亥', '乾'], right: ['戌'] }
    };

    function App() {  
      const [year, setYear] = useState(2008);  
      const [mountain, setMountain] = useState('癸');  
      const [yuan, setYuan] = useState(1);  
      const [juMode, setJuMode] = useState('auto');  
      const [degree, setDegree] = useState(186);  
      
      // PDF导出相关状态与Ref  
      const exportRef = useRef(null);  
      const [isExporting, setIsExporting] = useState(false);  
      const [toastMsg, setToastMsg] = useState('');  
      const [chartConfig, setChartConfig] = useState({    
        year: 2008,    
        mountain: '癸',    
        yuan: 1,    
        juMode: 'auto',    
        degree: 186  
      });  

      const draftDirection = MOUNTAINS[(MOUNTAINS.indexOf(mountain) + 12) % 24];  
      const draftAutoIsYang = YUAN_JU[mountain][0] === 1;  
      const draftAutoJuNum = YUAN_JU[mountain][yuan + 1];  
      const draftRefFacingIdx = degree === '' ? 0 : (Math.floor((Math.round(degree) + 7.5) / 15) + 1) % 24;  
      const draftRefFacing = MOUNTAINS[draftRefFacingIdx];  

      const updateMountainAndDegree = (newMountain) => {    
        setMountain(newMountain);    
        const mIdx = MOUNTAINS.indexOf(newMountain);    
        const fIdx = (mIdx + 12) % 24;    
        let deg = (fIdx - 1) * 15;    
        if (deg < 0) deg += 360;    
        setDegree(deg);  
      };  

      const updateFacingAndDegree = (newFacing) => {    
        const fIdx = MOUNTAINS.indexOf(newFacing);    
        const mIdx = (fIdx + 12) % 24;    
        setMountain(MOUNTAINS[mIdx]);    
        let deg = (fIdx - 1) * 15;    
        if (deg < 0) deg += 360;    
        setDegree(deg);  
      };  

      const handleDegreeChange = (val) => {    
        let deg = parseFloat(val);    
        if (isNaN(deg)) { setDegree(''); return; }    
        if (deg < 0) deg = 0;    
        if (deg >= 360) deg = 359.9;    
        setDegree(deg);  
      };  

      const generateChart = () => {    
        setChartConfig({ year, mountain, yuan, juMode, degree });  
      };  

      const showToast = (msg) => {    
        setToastMsg(msg);    
        setTimeout(() => setToastMsg(''), 3000);  
      };  

      // 一键导出 PDF 功能核心逻辑  
      const handleExportPDF = async () => {    
        if (!exportRef.current) return;    
        if (!window.html2canvas || !window.jspdf) {      
          showToast("PDF导出组件尚未准备好，请检查网络或稍等几秒再试...");      
          return;    
        }    
        setIsExporting(true);    
        try {      
          const canvas = await window.html2canvas(exportRef.current, {        
            scale: 2, // 提高清晰度        
            useCORS: true,        
            backgroundColor: '#0a0a0a' // 适配黑金风格的深色背景      
          });      
          const imgData = canvas.toDataURL('image/png');      
          const pdf = new window.jspdf.jsPDF('p', 'mm', 'a4');      
          const pdfWidth = pdf.internal.pageSize.getWidth();      
          const pdfHeight = (canvas.height * pdfWidth) / canvas.width;      
          // 添加图片到PDF (居中适宽贴图)      
          pdf.addImage(imgData, 'PNG', 0, 10, pdfWidth, pdfHeight);      
          // 保存文件      
          pdf.save(`九宝奇门_${chartConfig.year}年_${chartConfig.mountain}山.pdf`);    
        } catch (err) {      
          console.error("PDF导出失败:", err);      
          showToast("导出失败，请重试。");    
        } finally {      
          setIsExporting(false);    
        }  
      };  

      const panData = useMemo(() => {    
        const cy = chartConfig.year;    
        const cm = chartConfig.mountain;    
        const cYuan = chartConfig.yuan;    
        const cJuMode = chartConfig.juMode;    
        const yearStemIdx = (cy - 4 + 100) % 10;    
        const yearBranchIdx = (cy - 4 + 120) % 12;    
        const yearStem = STEMS[yearStemIdx];    
        const yearBranch = BRANCHES[yearBranchIdx];    
        const dayStemIdx = yearStemIdx;    
        const dayStem = yearStem;    
        const dayBranch = yearBranch;    
        const mountainIdx = MOUNTAINS.indexOf(cm);    
        const dirIdx = (mountainIdx + 12) % 24;    
        const direction = MOUNTAINS[dirIdx];    
        const hourBranchIdx = Math.floor(dirIdx / 2);    
        const hourBranch = BRANCHES[hourBranchIdx];    
        const baseStemIdx = (dayStemIdx % 5) * 2;    
        const hourStemIdx = (baseStemIdx + hourBranchIdx) % 10;    
        const hourStem = STEMS[hourStemIdx];    
        const autoIsYang = YUAN_JU[cm][0] === 1;    
        const autoJuNum = YUAN_JU[cm][cYuan + 1];    
        const isYang = cJuMode === 'auto' ? autoIsYang : cJuMode.startsWith('yang');    
        const juNum = cJuMode === 'auto' ? autoJuNum : parseInt(cJuMode.split('-')[1], 10);    
        let ep = {};    
        for (let i = 0; i < 9; i++) {      
          let p = juNum + (isYang ? i : -i);      
          p = ((p - 1) % 9 + 9) % 9 + 1;      
          ep[p] = BASE_STEMS[i];    
        }    
        let diff = (hourBranchIdx - hourStemIdx + 12) % 12;    
        const xunPairs = { 0: '戊', 10: '己', 8: '庚', 6: '辛', 4: '壬', 2: '癸' };    
        const xunHeadMap = { 0: '甲子', 10: '甲戌', 8: '甲申', 6: '甲午', 4: '甲辰', 2: '甲寅' };    
        const xunStem = xunPairs[diff];    
        const xunName = xunHeadMap[diff];    
        let zfOriginalPalace = parseInt(Object.keys(ep).find(k => ep[k] === xunStem));    
        let actualTargetStem = (hourStem === '甲') ? xunStem : hourStem;    
        let targetPalace = parseInt(Object.keys(ep).find(k => ep[k] === actualTargetStem));    
        let hp = {}, st = {};    
        let zfRing = RING_INDEX[zfOriginalPalace === 5 ? 2 : zfOriginalPalace];    
        let targetRing = RING_INDEX[targetPalace === 5 ? 2 : targetPalace];    
        let offset = (targetRing - zfRing + 8) % 8;    
        for (let i = 0; i < 8; i++) {      
          let fromP = OUTER_RING[i];      
          let toP = OUTER_RING[(i + offset) % 8];      
          hp[toP] = fromP === 2 ? ep[2] + (ep[5] || '') : ep[fromP];      
          st[toP] = STARS[i] === '芮' ? '禽芮' : STARS[i];    
        }    
        hp[5] = hp[2]; st[5] = st[2];    
        let dr = {};    
        let jumps = (hourBranchIdx - diff + 12) % 12;     
        let zsTargetPalace = zfOriginalPalace;    
        for (let i = 0; i < jumps; i++) zsTargetPalace = ((zsTargetPalace + (isYang ? 1 : -1) - 1) % 9 + 9) % 9 + 1;    
        let actualZsTarget = zsTargetPalace === 5 ? 2 : zsTargetPalace;    
        let zsRing = RING_INDEX[zfOriginalPalace === 5 ? 2 : zfOriginalPalace];    
        let doorOffset = (RING_INDEX[actualZsTarget] - zsRing + 8) % 8;    
        for (let i = 0; i < 8; i++) dr[OUTER_RING[(i + doorOffset) % 8]] = DOORS[i];    
        dr[5] = dr[2];    
        if (zsTargetPalace === 5) { dr[5] = '中'; dr[2] = '中'; }     
        else if (dr[actualZsTarget] === '死' && zfOriginalPalace === 5) dr[actualZsTarget] = '中';    
        let de = {};    
        let startRing = RING_INDEX[targetPalace === 5 ? 2 : targetPalace];    
        for (let i = 0; i < 8; i++) de[OUTER_RING[(startRing + (isYang ? i : -i) + 8) % 8]] = DEITIES[i];    
        de[5] = de[2];    
        let hd = {};    
        let hdStartPalace = zsTargetPalace;    
        let hSt = actualTargetStem;    
        let collision = (hp[hdStartPalace] && hp[hdStartPalace].includes(hSt)) || (ep[hdStartPalace] && ep[hdStartPalace].includes(hSt));    
        let startIdx = BASE_STEMS.indexOf(hSt);    
        if (!collision) {      
          let cur = hdStartPalace;      
          for (let i = 0; i < 9; i++) {        
            hd[cur] = BASE_STEMS[(startIdx + i) % 9];        
            cur = ((cur + (isYang ? 1 : -1) - 1) % 9 + 9) % 9 + 1;      
          }    
        } else {      
          hdStartPalace = 5; let cur = hdStartPalace, tempHd = {}, fbCollision = false;      
          for (let i = 0; i < 9; i++) {        
            tempHd[cur] = BASE_STEMS[(startIdx + i) % 9];        
            if ((hp[cur] && hp[cur].includes(tempHd[cur])) || (ep[cur] && ep[cur].includes(tempHd[cur]))) fbCollision = true;        
            cur = ((cur + (isYang ? 1 : -1) - 1) % 9 + 9) % 9 + 1;      
          }      
          if (!fbCollision) hd = tempHd;      
          else {        
            let ringIdx = RING_INDEX[8];        
            for (let i = 0; i < 8; i++) hd[OUTER_RING[(ringIdx + (isYang ? i : -i) + 8) % 8]] = BASE_STEMS[(startIdx + i) % 9];      
          }    
        }    
        if (hd[5]) hd[2] = (hd[2] ? hd[2] : '') + hd[5];    
        const mountainBagua = NA_JIA_BAGUA[cm];    
        const facingBagua = NA_JIA_BAGUA[direction];    
        const xiaoFuwei = BAGUA_BITS[mountainBagua];    
        const daFuwei = BAGUA_BITS[facingBagua];    
        let xiaoYn = {}, daYn = {};    
        [1,2,3,4,6,7,8,9].forEach(p => {      
          const pBaguaVal = BAGUA_BITS[PALACE_TO_BAGUA[p]];      
          xiaoYn[p] = XIAO_SHEN_SHA[pBaguaVal ^ xiaoFuwei][0];       
          daYn[p] = DA_SHEN_SHA[pBaguaVal ^ daFuwei][0];    
        });    
        const outerData = {};    
        for (const [pStr, layout] of Object.entries(OUTER_LAYOUT)) {      
          const p = parseInt(pStr);      
          outerData[p] = {};      
          for (const [pos, mList] of Object.entries(layout)) {        
            outerData[p][pos] = mList.map(m => {          
              const bagua = NA_JIA_BAGUA[m];          
              const shenshaFull = XIAO_SHEN_SHA[BAGUA_BITS[bagua] ^ xiaoFuwei];          
              const shensha = shenshaFull ? shenshaFull[0] : '';          
              return { m, bagua, shensha };        
            });      
          }    
        }    
        return {      
          yearStem, yearBranch, dayStem, dayBranch, direction, hourBranch, hourStem,       
          isYang, juNum, xunName, xunStem, autoIsYang, autoJuNum,      
          ep, hp, st, dr, de, hd,       
          mountainBagua, facingBagua, xiaoYn, daYn, outerData    
        };  
      }, [chartConfig]);  

      const mapGrid = [    
        { p: 4, name: '巽四' }, { p: 9, name: '离九' }, { p: 2, name: '坤二' },    
        { p: 3, name: '震三' }, { p: 5, name: '中五' }, { p: 7, name: '兑七' },    
        { p: 8, name: '艮八' }, { p: 1, name: '坎一' }, { p: 6, name: '乾六' }  
      ];  

      // --- 抽取外盘渲染函数 ---
      const renderTopItems = (items) => {
        if (!items) return null;
        return items.map((od, idx) => (
          <div key={idx} className="flex flex-col items-center justify-end pb-1 md:pb-2">
            <span className="text-xs md:text-sm text-red-500 font-bold mb-0.5 md:mb-1">{od.shensha}</span>
            <span className="text-sm md:text-base text-gray-400 font-bold mb-1 md:mb-1.5">{od.bagua}</span>
            <span className="text-xs md:text-sm font-black text-yellow-500">{od.m}</span>
          </div>
        ));
      };

      const renderBottomItems = (items) => {
        if (!items) return null;
        return items.map((od, idx) => (
          <div key={idx} className="flex flex-col items-center justify-start pt-1 md:pt-2">
            <span className="text-xs md:text-sm font-black text-yellow-500 mb-1 md:mb-1.5">{od.m}</span>
            <span className="text-sm md:text-base text-gray-400 font-bold mb-0.5 md:mb-1">{od.bagua}</span>
            <span className="text-xs md:text-sm text-red-500 font-bold">{od.shensha}</span>
          </div>
        ));
      };

      const renderLeftItems = (items) => {
        if (!items) return null;
        return (
          <div className="flex flex-col justify-evenly h-full w-full">
            {items.map((od, idx) => (
              <div key={idx} className="flex items-center justify-end gap-1 md:gap-3">
                <span className="text-xs md:text-sm text-red-500 font-bold">{od.shensha}</span>
                <span className="text-sm md:text-base text-gray-400 font-bold">{od.bagua}</span>
                <span className="text-xs md:text-sm font-black text-yellow-500">{od.m}</span>
              </div>
            ))}
          </div>
        );
      };

      const renderRightItems = (items) => {
        if (!items) return null;
        return (
          <div className="flex flex-col justify-evenly h-full w-full">
            {items.map((od, idx) => (
              <div key={idx} className="flex items-center justify-start gap-1 md:gap-3">
                <span className="text-xs md:text-sm font-black text-yellow-500">{od.m}</span>
                <span className="text-sm md:text-base text-gray-400 font-bold">{od.bagua}</span>
                <span className="text-xs md:text-sm text-red-500 font-bold">{od.shensha}</span>
              </div>
            ))}
          </div>
        );
      };

      return (    
        <div className="min-h-screen bg-gray-950 text-gray-200 p-2 md:p-6 font-sans selection:bg-yellow-600/30">      
          {/* 提示消息 Toast */}      
          {toastMsg && (        
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-yellow-600 text-black px-6 py-3 rounded shadow-[0_0_15px_rgba(212,175,55,0.4)] z-50 transition-opacity font-bold">          
              {toastMsg}        
            </div>      
          )}      
          <div className="max-w-5xl mx-auto bg-[#121212] rounded-xl shadow-2xl shadow-yellow-900/10 p-4 md:p-8 border border-gray-800">        
            {/* LOGO 与 标题 */}        
            <div className="flex flex-col items-center justify-center mb-8">          
              <a             
                href="http://www.jiubaoqimen.com"             
                target="_blank"             
                rel="noopener noreferrer"             
                className="group flex flex-col items-center cursor-pointer mb-3 decoration-transparent"            
                title="访问九寶奇门官方网站"          
              >            
                <div               
                  className="w-[3.5rem] h-[3.5rem] md:w-[4rem] md:h-[4rem] border-[3px] border-yellow-600 text-yellow-500 flex flex-wrap content-center justify-center text-[18px] md:text-[20px] leading-none font-serif font-bold rounded-md shadow-[0_0_10px_rgba(212,175,55,0.2)] group-hover:bg-yellow-600/10 group-hover:shadow-[0_0_15px_rgba(212,175,55,0.4)] transition-all tracking-widest p-1"               
                  style={{ writingMode: 'vertical-rl' }}            
                >              
                  九寶奇门            
                </div>          
              </a>          
              <h1 className="text-2xl md:text-3xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-yellow-500 to-yellow-600 tracking-wide">            
                山向奇门深层起局排盘系统          
              </h1>          
              <a             
                href="http://www.jiubaoqimen.com"             
                target="_blank"             
                rel="noopener noreferrer"             
                className="mt-2 text-gray-500 hover:text-yellow-500 hover:underline text-sm md:text-base font-medium transition-colors"          
              >            
                www.jiubaoqimen.com          
              </a>        
            </div>        
            
            {/* 控制面板（草稿区） - 导出PDF时将跳过此区域 */}        
            <div className="flex flex-col gap-5 justify-center bg-gray-900 p-4 md:p-6 rounded-lg border border-gray-800 shadow-inner">          
              <div className="flex flex-wrap items-center justify-center gap-4">            
                <div className="flex items-center bg-gray-950 rounded border border-gray-700 overflow-hidden shadow-sm">              
                  <div className="bg-gray-800 px-3 py-1.5 font-semibold text-yellow-500 border-r border-gray-700">立向年份</div>              
                  <button onClick={() => setYear(y => y - 1)} className="px-4 py-1.5 hover:bg-gray-800 font-bold text-gray-400 transition-colors">-</button>              
                  <input                 
                    type="number"                 
                    value={year}                 
                    onChange={(e) => setYear(Number(e.target.value))}                
                    className="w-20 text-center outline-none font-medium bg-gray-950 text-yellow-500"              
                  />              
                  <button onClick={() => setYear(y => y + 1)} className="px-4 py-1.5 hover:bg-gray-800 font-bold text-gray-400 border-l border-gray-700 transition-colors">+</button>            
                </div>            
                <select               
                  value={year}               
                  onChange={(e) => setYear(Number(e.target.value))}              
                  className="border border-gray-700 rounded px-3 py-1.5 outline-none focus:ring-2 focus:ring-yellow-600 bg-gray-950 text-gray-200 font-medium shadow-sm cursor-pointer"            
                >              
                  {Array.from({length: 201}, (_, i) => 1900 + i).map(y => (                
                    <option key={y} value={y}>{y} 年</option>              
                  ))}            
                </select>          
              </div>          
              
              <div className="flex flex-wrap items-center justify-center gap-6">            
                <div className="flex items-center space-x-2">              
                  <label className="font-semibold text-yellow-600">坐山:</label>              
                  <select                 
                    value={mountain}                 
                    onChange={(e) => updateMountainAndDegree(e.target.value)}                
                    className="border border-gray-700 rounded px-2 py-1 outline-none focus:ring-2 focus:ring-yellow-600 bg-gray-950 text-gray-200 font-medium shadow-sm"              
                  >                
                    {MOUNTAINS.map(m => <option key={m} value={m}>{m}山</option>)}              
                  </select>            
                </div>            
                <div className="flex items-center space-x-2">              
                  <label className="font-semibold text-yellow-600">朝向:</label>              
                  <select                 
                    value={draftDirection}                 
                    onChange={(e) => updateFacingAndDegree(e.target.value)}                
                    className="border border-gray-700 rounded px-2 py-1 outline-none focus:ring-2 focus:ring-yellow-600 bg-gray-950 text-gray-200 font-medium shadow-sm"              
                  >                
                    {MOUNTAINS.map(m => <option key={m} value={m}>{m}向</option>)}              
                  </select>            
                </div>            
                <div className="flex items-center space-x-2 bg-gray-950 px-2 py-1 rounded border border-gray-700 shadow-sm">              
                  <label className="font-semibold text-yellow-600">罗经三元:</label>              
                  <select                 
                    value={yuan}                 
                    onChange={(e) => setYuan(Number(e.target.value))}                
                    className="outline-none focus:ring-2 focus:ring-yellow-600 bg-transparent font-medium text-gray-200"              
                  >                
                    <option value={0}>上元</option>
                    <option value={1}>中元</option>
                    <option value={2}>下元</option>              
                  </select>            
                </div>            
                <div className="flex items-center space-x-2 bg-gray-950 px-2 py-1 rounded border border-gray-700 shadow-sm">              
                  <label className="font-semibold text-yellow-600">排盘局数:</label>              
                  <select                 
                    value={juMode}                 
                    onChange={(e) => setJuMode(e.target.value)}                
                    className="outline-none focus:ring-2 focus:ring-yellow-600 bg-transparent font-bold text-yellow-500 cursor-pointer"              
                  >                
                    <option value="auto">系统推演 ({draftAutoIsYang ? '阳' : '阴'}遁{draftAutoJuNum}局)</option>                
                    <optgroup label="阳遁 1-9 局" className="text-gray-300">                  
                      {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => <option key={`yang-${n}`} value={`yang-${n}`}>阳遁 {n} 局</option>)}                
                    </optgroup>                
                    <optgroup label="阴遁 1-9 局" className="text-gray-300">                  
                      {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(n => <option key={`yin-${n}`} value={`yin-${n}`}>阴遁 {n} 局</option>)}                
                    </optgroup>              
                  </select>            
                </div>          
              </div>          
              
              <div className="flex flex-col md:flex-row items-center w-full mt-2 bg-gray-950 p-3 rounded border border-gray-800 shadow-sm max-w-3xl mx-auto gap-6 justify-between">            
                <div className="flex items-center">              
                  <label className="font-semibold text-yellow-600 whitespace-nowrap mr-3">罗盘度数:</label>              
                  <select                 
                    value={Math.round(degree)}                 
                    onChange={(e) => handleDegreeChange(e.target.value)}                
                    className="border border-gray-700 rounded px-3 py-1.5 outline-none focus:ring-2 focus:ring-yellow-600 bg-gray-900 font-bold text-yellow-500 shadow-sm cursor-pointer min-w-[100px]"              
                  >                
                    {Array.from({length: 360}, (_, i) => (                  
                      <option key={i} value={i}>{i}°</option>                
                    ))}              
                  </select>              
                  <div className="ml-4 text-sm text-gray-500 font-medium whitespace-nowrap">                
                    (正针落区参考: <span className="text-gray-400 font-bold">{draftRefFacing}向</span>)              
                  </div>            
                </div>            
                
                <div className="relative w-24 h-24 rounded-full border-4 border-yellow-700 bg-gray-900 flex items-center justify-center shadow-inner flex-shrink-0">              
                  <span className="absolute top-1 text-[10px] font-bold text-gray-500">子</span>              
                  <span className="absolute bottom-1 text-[10px] font-bold text-gray-500">午</span>              
                  <span className="absolute right-1 text-[10px] font-bold text-gray-500">卯</span>              
                  <span className="absolute left-1 text-[10px] font-bold text-gray-500">酉</span>              
                  <div className="absolute inset-[14px] border border-dashed border-gray-700 rounded-full opacity-60"></div>              
                  
                  <div                 
                    className="absolute w-full h-full transition-transform duration-500 ease-out z-10"                
                    style={{ transform: `rotate(${degree === '' ? 0 : degree}deg)` }}              
                  >                
                    <div className="absolute top-1/2 left-1/2 w-0.5 h-10 bg-red-600 origin-bottom transform -translate-x-1/2 -translate-y-full rounded-t-full shadow-[0_0_5px_rgba(220,38,38,0.8)]"></div>
                    <div className="absolute top-1/2 left-1/2 w-2.5 h-2.5 rounded-full bg-yellow-500 transform -translate-x-1/2 -translate-y-1/2 border-2 border-gray-900 shadow-sm"></div>
                  </div>            
                </div>          
              </div>

              <div className="flex justify-center gap-4 mt-2">
                <button 
                  onClick={generateChart}
                  className="bg-gradient-to-r from-yellow-600 to-yellow-500 hover:from-yellow-500 hover:to-yellow-400 text-black font-extrabold py-2.5 px-8 rounded shadow-[0_0_10px_rgba(212,175,55,0.3)] transition-all"
                >
                  生成排盘
                </button>
                <button 
                  onClick={handleExportPDF}
                  disabled={isExporting}
                  className="bg-gray-800 hover:bg-gray-700 text-yellow-500 border border-yellow-600/50 font-bold py-2.5 px-8 rounded shadow transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
                >
                  {isExporting ? '生成PDF中...' : '一键导出 PDF'}
                </button>
              </div>
            </div>

            {/* 分割线 */}
            <div className="my-8 border-b border-dashed border-gray-800"></div>

            {/* 排盘渲染区 (PDF 导出目标) */}
            <div ref={exportRef} className="bg-[#0a0a0a] p-6 md:p-10 rounded max-w-4xl mx-auto shadow-2xl border border-gray-800/50 relative overflow-hidden">
              
              {/* 排盘 Header Info */}
              <div className="text-center mb-6 relative z-10">
                <h2 className="text-2xl md:text-3xl font-extrabold text-yellow-500 mb-3 tracking-wide drop-shadow-md">
                  {chartConfig.year}年 {chartConfig.mountain}山{panData.direction}向 奇门排盘
                </h2>
                <div className="flex flex-wrap justify-center gap-x-6 gap-y-2 text-sm md:text-base font-semibold text-gray-300 bg-gray-900/80 py-3 px-4 rounded-lg border border-gray-800">
                  <span className="text-yellow-600">{panData.yearStem}{panData.yearBranch}年</span>
                  <span>{panData.dayStem}{panData.dayBranch}日</span>
                  <span>{panData.hourStem}{panData.hourBranch}时</span>
                  <span className="text-cyan-500">{panData.isYang ? '阳' : '阴'}遁 {panData.juNum} 局</span>
                  <span className="text-gray-400">旬首: {panData.xunName} ({panData.xunStem})</span>
                </div>
                
                <div className="flex justify-center gap-6 mt-3 text-xs md:text-sm text-gray-500">
                  <span>坐山纳甲: {panData.mountainBagua}</span>
                  <span>朝向纳甲: {panData.facingBagua}</span>
                  <span>罗经度数: {chartConfig.degree}°</span>
                </div>
              </div>

              {/* 九宫格渲染区（包含外围 24 山排列） */}
              <div className="flex flex-col w-full max-w-[650px] mx-auto select-none mt-2 md:mt-6 relative z-10">
                
                {/* 上部外盘 */}
                <div className="flex w-full">
                  <div className="w-[3.5rem] md:w-[5.5rem] flex-shrink-0"></div>
                  <div className="flex-1 grid grid-cols-3 gap-1 md:gap-2 px-[7px] md:px-[12px]">
                    <div className="flex justify-evenly items-end">{renderTopItems(panData.outerData[4]?.top)}</div>
                    <div className="flex justify-evenly items-end">{renderTopItems(panData.outerData[9]?.top)}</div>
                    <div className="flex justify-evenly items-end">{renderTopItems(panData.outerData[2]?.top)}</div>
                  </div>
                  <div className="w-[3.5rem] md:w-[5.5rem] flex-shrink-0"></div>
                </div>

                {/* 中间层 (左侧外盘 + 主九宫格 + 右侧外盘) */}
                <div className="flex w-full my-1 md:my-2">
                  
                  {/* 左侧外盘 */}
                  <div className="w-[3.5rem] md:w-[5.5rem] flex-shrink-0 flex flex-col gap-1 md:gap-2 py-[7px] md:py-[12px] pr-1 md:pr-3">
                    <div className="flex-1">{renderLeftItems(panData.outerData[4]?.left)}</div>
                    <div className="flex-1">{renderLeftItems(panData.outerData[3]?.left)}</div>
                    <div className="flex-1">{renderLeftItems(panData.outerData[8]?.left)}</div>
                  </div>

                  {/* 主九宫格 (黑金外框) */}
                  <div className="flex-1 grid grid-cols-3 gap-[2px] md:gap-[3px] bg-[#d4af37] border-[3px] md:border-4 border-[#d4af37] p-[2px] shadow-[0_0_20px_rgba(212,175,55,0.15)]">
                    {mapGrid.map((item) => {
                      const p = item.p;
                      const isCenter = p === 5;
                      
                      return (
                        <div 
                          key={p} 
                          className="flex flex-col justify-between p-1 md:p-1.5 relative bg-[#111111] aspect-square overflow-hidden hover:bg-[#1a1a1a] transition-colors"
                        >
                          {/* 宫位水印 */}
                          <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none opacity-[0.03]">
                            <span className="text-[3rem] md:text-[4.5rem] font-black text-white leading-none tracking-widest">{item.name.substring(0,1)}</span>
                            <span className="text-[3rem] md:text-[4.5rem] font-black text-white leading-none tracking-widest">{item.name.substring(1,2)}</span>
                          </div>

                          <div className="relative z-10 flex flex-col h-full w-full justify-between">
                            {isCenter ? (
                              // 中五宫特有格式
                              <div className="flex flex-col items-center justify-center h-full">
                                <span className="text-gray-500 text-[10px] md:text-sm font-medium mb-1 md:mb-2">(寄坤二)</span>
                                <div className="w-8 md:w-10 h-[1px] bg-gray-700 mb-2 md:mb-3"></div>
                                <span className="text-xl md:text-2xl font-bold text-yellow-500 drop-shadow-md">{panData.ep[p] || ''}</span>
                              </div>
                            ) : (
                              // 其他八宫格式
                              <>
                                {/* 第一行：八神 (左侧) & 暗干 (右侧) */}
                                <div className="flex justify-between items-start">
                                  <span className="font-bold text-yellow-500 text-xs md:text-base leading-none">{panData.de[p] || ''}</span>
                                  <span className="font-bold text-fuchsia-400 text-[10px] md:text-xs leading-none">{panData.hd[p] ? `[${panData.hd[p]}]` : ''}</span>
                                </div>

                                {/* 第二行：天地盘 & 星门 */}
                                <div className="flex justify-center items-stretch flex-1 w-full my-1 md:my-2">
                                  <div className="flex justify-between items-stretch w-full px-1 md:px-2">
                                    {/* 左列：天地盘列 (间距贴紧，整体略微下沉) */}
                                    <div className="flex flex-col items-center justify-center mt-1 md:mt-2">
                                      <span className="font-bold text-red-500 mb-0.5 md:mb-1 whitespace-nowrap drop-shadow-[0_0_3px_rgba(239,68,68,0.4)]">
                                        <span className="text-base md:text-xl leading-none">{panData.hp[p]?.[0] || ''}</span>
                                        {panData.hp[p]?.[1] && <span className="text-[10px] md:text-base leading-none ml-[2px]">{panData.hp[p][1]}</span>}
                                      </span>
                                      <div className="w-5 md:w-6 h-[1px] bg-gray-600"></div>
                                      <span className="font-bold text-gray-200 mt-0.5 md:mt-1 whitespace-nowrap drop-shadow-md">
                                        <span className="text-base md:text-xl leading-none">{panData.ep[p] || ''}</span>
                                        {p === 2 && panData.ep[5] && <span className="text-[10px] md:text-base leading-none ml-[2px]">{panData.ep[5]}</span>}
                                      </span>
                                    </div>
                                    {/* 右列：星门列 (星略高于天盘，门在右下方) */}
                                    <div className="flex flex-col items-center justify-between py-1 md:py-1.5">
                                      <span className="font-bold text-cyan-400 text-xs md:text-lg leading-none -mt-1 md:-mt-1.5 drop-shadow-[0_0_3px_rgba(34,211,238,0.3)]">{panData.st[p] || ''}</span>
                                      <span className="font-bold text-emerald-400 text-xs md:text-lg leading-none translate-y-[8px] md:translate-y-[14px] drop-shadow-[0_0_3px_rgba(52,211,153,0.3)]">{panData.dr[p] || ''}</span>
                                    </div>
                                  </div>
                                </div>

                                {/* 第三行：大小神煞 */}
                                <div className="w-full text-center border-t border-dashed border-gray-700 pt-1 md:pt-1.5 pb-0.5">
                                  <span className="text-[9px] md:text-xs text-gray-500 font-medium">
                                    大:{panData.daYn[p] || ''} | 小:{panData.xiaoYn[p] || ''}
                                  </span>
                                </div>
                              </>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>

                  {/* 右侧外盘 */}
                  <div className="w-[3.5rem] md:w-[5.5rem] flex-shrink-0 flex flex-col gap-1 md:gap-2 py-[7px] md:py-[12px] pl-1 md:pl-3">
                    <div className="flex-1">{renderRightItems(panData.outerData[2]?.right)}</div>
                    <div className="flex-1">{renderRightItems(panData.outerData[7]?.right)}</div>
                    <div className="flex-1">{renderRightItems(panData.outerData[6]?.right)}</div>
                  </div>
                </div>

                {/* 下部外盘 */}
                <div className="flex w-full">
                  <div className="w-[3.5rem] md:w-[5.5rem] flex-shrink-0"></div>
                  <div className="flex-1 grid grid-cols-3 gap-1 md:gap-2 px-[7px] md:px-[12px]">
                    <div className="flex justify-evenly items-start">{renderBottomItems(panData.outerData[8]?.bottom)}</div>
                    <div className="flex justify-evenly items-start">{renderBottomItems(panData.outerData[1]?.bottom)}</div>
                    <div className="flex justify-evenly items-start">{renderBottomItems(panData.outerData[6]?.bottom)}</div>
                  </div>
                  <div className="w-[3.5rem] md:w-[5.5rem] flex-shrink-0"></div>
                </div>

              </div>
              
              <div className="mt-8 text-center text-xs text-yellow-600/50 font-medium">
                Powered by 九寶奇门系统
              </div>
            </div>

          </div>    
        </div>  
      );
    }

    // 渲染应用
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
